name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Create Google-services.json placeholder
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "google-services.json already exists"
          else
            echo '{}' > android/app/google-services.json
          fi

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ls -la app/build/outputs/apk/release/

      - name: Get version name
        id: version
        run: |
          VERSION_NAME=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: italian-bridge-v${{ steps.version.outputs.version }}-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body: |
            Italian Bridge v${{ steps.version.outputs.version }}
            
            A 4-player partnership card game with bidding and trump mechanics.
            
            Install this APK on your Android device to play against AI opponents.
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
